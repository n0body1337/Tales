[package]
name = "tales"
version = "1.0.0-alpha"
edition = "2021"
authors = ["Andre MARTINS"]
description = "Tales — UCI chess engine written in Rust"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1

[profile.profiling]
inherits = "release"
debug = true
